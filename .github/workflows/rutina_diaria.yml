name: Rutina Diaria Kowen

on:
  schedule:
    # Corre cada 30 min en horario laboral Chile (9:00 - 19:00, CLT=UTC-4).
    # 13-23 UTC = 9 AM - 7 PM Chile. 22 corridas / dia laboral.
    # Reemplaza al daemon de Railway. Frecuencia alta para capturar pedidos
    # de planillas y Bsale casi en tiempo real.
    - cron: '0,30 13-23 * * 1-5'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  rutina:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ejecutar rutina diaria
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BSALE_API_TOKEN: ${{ secrets.BSALE_API_TOKEN }}
          DRIVIN_API_KEY: ${{ secrets.DRIVIN_API_KEY }}
          GOOGLE_SHEETS_KOWEN_ID: ${{ secrets.GOOGLE_SHEETS_KOWEN_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: github-actions
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: python scheduler.py
