name: Rutina Diaria Kowen

on:
  schedule:
    # Corre 3 veces al dia (hora Chile CLT=UTC-4 en otono/invierno).
    # 9:00 AM -> apertura + entregados de ayer
    # 13:00   -> mitad de dia, clientes van llegando a planilla
    # 17:00   -> corte oficial, ultimo barrido antes de cerrar
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  rutina:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ejecutar rutina diaria
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BSALE_API_TOKEN: ${{ secrets.BSALE_API_TOKEN }}
          DRIVIN_API_KEY: ${{ secrets.DRIVIN_API_KEY }}
          GOOGLE_SHEETS_KOWEN_ID: ${{ secrets.GOOGLE_SHEETS_KOWEN_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: github-actions
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: python scheduler.py
